<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My First Project</title>

    <style>
        body {
            background: #111827;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>My First Vibe-Coded Website</h1>
    <h2>Learning the real Git workflow</h2>

<p>
    Version 2: edited locally, committed with Git,
    and pushed from the terminal.
</p>

    <p id="message">
        I am now editing this project locally with VS Code.
    </p>

    <button onclick="changeMessage()">
        Click me
    </button>
<section>
    <h2>What I am learning</h2>

    <p>
        HTML, CSS, JavaScript, Git, GitHub and how real
        development workflows operate.
    </p>
</section>
    <script>
        function changeMessage() {
            document.getElementById("message").textContent =
                "The button works. Humanity survives another day.";
        }
    </script>
</body>
</html>
